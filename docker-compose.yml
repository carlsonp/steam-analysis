services:

  steam:
    build:
      dockerfile: Dockerfile
    image: ghcr.io/carlsonp/steam-analysis:latest
    restart: unless-stopped
    container_name: steam
    hostname: steam
    volumes:
      - ./logs:/logs:rw
    environment:
      TZ: "America/Chicago"
      MONGODB_IP: ${MONGODB_IP}
      MONGODB_PORT: ${MONGODB_PORT}
      TWITCH_CLILENT_ID: ${TWITCH_CLILENT_ID}
    depends_on:
      - mongo

  mongo:
    image: mongo:7.0.34
    restart: unless-stopped
    container_name: mongo
    hostname: mongo
    environment:
      TZ: "America/Chicago"
      MONGO_INITDB_DATABASE: "steam"
    ports:
      - 27017:27017/tcp
    volumes:
      - mongodata:/data/db:rw

volumes:
  mongodata:
